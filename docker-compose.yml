services:
  postgres:
    image: postgres:16-alpine
    container_name: library-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Europe/Moscow
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - library-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: library-api:latest
    container_name: library-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      TZ: Europe/Moscow
      ConnectionStrings__LibraryDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true"
      JwtSettings__Key: ${JWT_KEY}
      JwtSettings__Issuer: LibraryMPT
      JwtSettings__Audience: LibraryMPT.Api
      Cors__AllowedOrigins__0: http://${PUBLIC_HOST}
      Cors__AllowedOrigins__1: http://localhost
      LibraryWeb__PublicBaseUrl: http://${PUBLIC_HOST}
      SmtpSettings__SmtpUser: ${SMTP_USER:-}
      SmtpSettings__SmtpPass: ${SMTP_PASS:-}
      SmtpSettings__FromEmail: ${SMTP_FROM:-}
    volumes:
      - ./wwwroot/books:/app/wwwroot/books
      - ./wwwroot/images:/app/wwwroot/images
    networks:
      - library-net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: library-web:latest
    container_name: library-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      TZ: Europe/Moscow
      ConnectionStrings__LibraryDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true"
      ApiSettings__BaseUrl: http://api:8080
      JwtSettings__Key: ${JWT_KEY}
      JwtSettings__Issuer: LibraryMPT
      JwtSettings__Audience: LibraryMPT.Api
      SmtpSettings__SmtpUser: ${SMTP_USER:-}
      SmtpSettings__SmtpPass: ${SMTP_PASS:-}
      SmtpSettings__FromEmail: ${SMTP_FROM:-}
    volumes:
      - ./wwwroot/books:/app/wwwroot/books
      - ./wwwroot/images:/app/wwwroot/images
    networks:
      - library-net

  nginx:
    image: nginx:1.27-alpine
    container_name: library-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - library-net

networks:
  library-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
